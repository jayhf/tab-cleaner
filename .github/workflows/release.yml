name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Use run number as version so each build gets a unique, incrementing version
      - name: Set version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          npm pkg set version="$VERSION"

      - run: npx wxt build -b firefox
      - run: npx wxt build -b chrome

      - name: Sign Firefox XPI
        run: npx web-ext sign --channel=unlisted --source-dir=.output/firefox-mv2 --artifacts-dir=.output/signed
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_API_SECRET }}

      - name: Rename signed XPI
        run: mv .output/signed/*.xpi tab-cleaner-firefox.xpi

      - name: Package Chrome ZIP
        run: cd .output/chrome-mv3 && zip -r ../../tab-cleaner-chrome.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          make_latest: true
          files: |
            tab-cleaner-firefox.xpi
            tab-cleaner-chrome.zip
